<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Song 3D — 1344 recordings × BirdNET embedding UMAP</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0e; color: #ddd;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #canvas { display: block; }
  #panel { position: fixed; top: 14px; left: 14px; background: rgba(20,20,28,0.92);
           padding: 16px 18px; border: 1px solid #333; border-radius: 8px;
           font-size: 13px; max-width: 280px; backdrop-filter: blur(8px); }
  #panel h1 { font-size: 14px; margin: 0 0 8px 0; font-weight: 600; letter-spacing: 0.02em; }
  #panel .meta { color: #888; font-size: 11px; margin-bottom: 12px; line-height: 1.5; }
  #panel label { display: block; margin: 6px 0; cursor: pointer; user-select: none; }
  #panel input[type=radio] { margin-right: 6px; }
  #legend { position: fixed; bottom: 14px; left: 14px; background: rgba(20,20,28,0.92);
            padding: 12px 16px; border: 1px solid #333; border-radius: 8px;
            font-size: 12px; max-width: 280px; max-height: 50vh; overflow-y: auto;
            backdrop-filter: blur(8px); }
  #legend h2 { font-size: 12px; margin: 0 0 8px 0; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
            margin-right: 8px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); }
  #tooltip { position: fixed; padding: 10px 12px; background: rgba(10,10,16,0.96);
             border: 1px solid #444; border-radius: 6px; font-size: 11px; pointer-events: none;
             display: none; z-index: 1000; line-height: 1.5; max-width: 260px; }
  #tooltip .id { color: #888; font-size: 10px; }
  #tooltip .sp { color: #fff; font-weight: 600; margin-bottom: 2px; }
  #stats { position: fixed; top: 14px; right: 14px; background: rgba(20,20,28,0.92);
           padding: 10px 14px; border: 1px solid #333; border-radius: 8px;
           font-size: 11px; color: #888; font-family: monospace; }
</style>
</head>
<body>
<div id="panel">
  <h1>Bird Song 3D</h1>
  <div class="meta">
    1,344 recordings × BirdNET-embedding (1024-dim → UMAP 3D)<br>
    4 pilot species, 14 dialect clusters
  </div>
  <div style="font-weight: 600; margin: 8px 0 6px 0; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;">Color by</div>
  <label><input type="radio" name="colorBy" value="species" checked> Species (4)</label>
  <label><input type="radio" name="colorBy" value="species_dialect"> Dialect cluster (14)</label>
  <label><input type="radio" name="colorBy" value="bcr_name"> BCR (ecoregion)</label>
</div>
<div id="legend"></div>
<div id="tooltip"></div>
<div id="stats"></div>
<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');
const legend = document.getElementById('legend');
const statsEl = document.getElementById('stats');

// --- scene ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0a0e, 30, 90);
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(35, 25, 35);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// --- subtle reference axes + grid ---
const grid = new THREE.GridHelper(60, 30, 0x222230, 0x18181f);
scene.add(grid);

// --- distinct color palette ---
const speciesPalette = {
  "Carolina chickadee":     "#ff6b6b",
  "marsh wren":             "#4ecdc4",
  "song sparrow":           "#ffd93d",
  "white-crowned sparrow":  "#a78bfa",
};
// dialect palette — 14 distinct colors keyed by "species/cN"
const dialectColorOrder = [
  "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e","#10b981",
  "#06b6d4","#0ea5e9","#3b82f6","#6366f1","#8b5cf6","#a855f7","#d946ef",
  "#ec4899","#f43f5e","#fb7185","#fda4af","#a3a3a3","#525252"
];
function makeDialectMap(points) {
  const keys = [...new Set(points.map(p => p.species_dialect))].sort();
  const map = {};
  keys.forEach((k, i) => { map[k] = dialectColorOrder[i % dialectColorOrder.length]; });
  return map;
}
function makeBcrMap(points) {
  const keys = [...new Set(points.map(p => p.bcr_name))].sort();
  const map = {};
  keys.forEach((k, i) => { map[k] = dialectColorOrder[i % dialectColorOrder.length]; });
  return map;
}

let dialectMap = {};
let bcrMap = {};

// --- load data ---
let pointsData = [];
let geometry, material, pointsMesh;

fetch('birdsong_3d_points.json').then(r => r.json()).then(data => {
  pointsData = data.points;
  statsEl.textContent = `n=${data.n_points} | ${data.n_species_dialects} clusters | ${data.species_list.length} species`;
  dialectMap = makeDialectMap(pointsData);
  bcrMap = makeBcrMap(pointsData);

  // Center coordinates
  let cx=0, cy=0, cz=0;
  pointsData.forEach(p => { cx += p.x; cy += p.y; cz += p.z; });
  cx /= pointsData.length; cy /= pointsData.length; cz /= pointsData.length;

  const positions = new Float32Array(pointsData.length * 3);
  const colors = new Float32Array(pointsData.length * 3);
  for (let i = 0; i < pointsData.length; i++) {
    const p = pointsData[i];
    positions[3*i+0] = p.x - cx;
    positions[3*i+1] = p.y - cy;
    positions[3*i+2] = p.z - cz;
  }

  geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  material = new THREE.PointsMaterial({
    size: 0.55,
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.92,
  });

  pointsMesh = new THREE.Points(geometry, material);
  scene.add(pointsMesh);

  applyColors('species');
  document.querySelectorAll('input[name=colorBy]').forEach(el => {
    el.addEventListener('change', e => applyColors(e.target.value));
  });
  animate();
});

function applyColors(mode) {
  const colors = geometry.getAttribute('color').array;
  const counts = {};
  for (let i = 0; i < pointsData.length; i++) {
    const p = pointsData[i];
    let hex;
    if (mode === 'species') hex = speciesPalette[p.species] || '#888';
    else if (mode === 'species_dialect') hex = dialectMap[p.species_dialect] || '#888';
    else hex = bcrMap[p.bcr_name] || '#888';
    const c = new THREE.Color(hex);
    colors[3*i+0] = c.r; colors[3*i+1] = c.g; colors[3*i+2] = c.b;
    const key = mode === 'species' ? p.species :
                mode === 'species_dialect' ? p.species_dialect : p.bcr_name;
    counts[key] = (counts[key] || 0) + 1;
  }
  geometry.getAttribute('color').needsUpdate = true;
  renderLegend(mode, counts);
}

function renderLegend(mode, counts) {
  const title = mode === 'species' ? 'Species' :
                mode === 'species_dialect' ? 'Dialect cluster' : 'BCR ecoregion';
  const palette = mode === 'species' ? speciesPalette :
                  mode === 'species_dialect' ? dialectMap : bcrMap;
  const keys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  let html = `<h2>${title}</h2>`;
  keys.forEach(k => {
    const hex = palette[k] || '#888';
    html += `<div><span class="swatch" style="background:${hex}"></span>${k} <span style="color:#666">(${counts[k]})</span></div>`;
  });
  legend.innerHTML = html;
}

// --- raycaster for tooltip ---
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.4;
const mouse = new THREE.Vector2();
canvas.addEventListener('pointermove', (e) => {
  if (!pointsMesh) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(pointsMesh);
  if (hits.length > 0) {
    const p = pointsData[hits[0].index];
    tooltip.innerHTML = `
      <div class="sp">${p.species}</div>
      <div>cluster: ${p.dialect >= 0 ? 'c' + p.dialect : 'noise'}</div>
      <div>BCR: ${p.bcr_name}</div>
      ${p.ssp ? `<div>ssp: ${p.ssp}</div>` : ''}
      <div class="id">xc id ${p.id}</div>
    `;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.style.display = 'block';
  } else {
    tooltip.style.display = 'none';
  }
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (pointsMesh) {
    // very subtle auto-rotate when user not interacting
    pointsMesh.rotation.y += 0.0006;
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
